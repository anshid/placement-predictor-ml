<!DOCTYPE html>
<html>

<head>
    <title>Student Placement Predictor</title>

    <style>

        body {
            font-family: Arial;
            background-color: #f4f6f9;
            text-align: center;
            padding-top: 50px;
        }

        .container {
            width: 400px;
            margin: auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #333;
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 20px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #45a049;
        }

        .result {
            margin-top: 20px;
            font-size: 20px;
            font-weight: bold;
        }

    </style>
</head>

<body>

<div class="container">

<h1>Placement Predictor</h1>

<p>Enter student details</p>

<form action="/predict" method="post">

<input type="number" step="0.01" name="cgpa" placeholder="Enter CGPA" required>

<input type="number" name="iq" placeholder="Enter IQ" required>

<button type="submit">Predict</button>

</form>

<div class="result">
{{ prediction }}
</div>

</div>

</body>
</html>
