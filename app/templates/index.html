<!DOCTYPE html>
<html lang="en">
<head>
    <title>Placement Predictor</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container">

    <div class="row justify-content-center mt-5">

        <div class="col-md-6">

            <div class="card shadow">

                <div class="card-body">

                    <h2 class="text-center mb-4">Placement Predictor</h2>

                    <form action="/predict" method="POST">

                        <div class="mb-3">
                            <label class="form-label">CGPA</label>
                            <input type="number" step="0.01" name="cgpa" class="form-control" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">IQ</label>
                            <input type="number" name="iq" class="form-control" required>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">
                                Predict Placement
                            </button>
                        </div>

                    </form>

                    {% if prediction %}
                    <div class="alert alert-info mt-4 text-center">
                        <h4>{{ prediction }}</h4>
                        <p>Probability: {{ probability }}%</p>
                    </div>
                    {% endif %}

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
